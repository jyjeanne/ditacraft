name: Build and Test

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: |
        echo "## 🔒 Release Security Audit" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if npm audit --audit-level=high 2>&1 | tee audit-output.txt; then
          echo "✅ **No high or critical vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Security vulnerabilities detected — release blocked**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

  build-and-test:
    needs: security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install server dependencies
      run: cd server && npm ci

    - name: Run linter
      run: npm run lint

    - name: Type-check (client + server)
      run: npm run check-types

    - name: Build with esbuild
      run: npm run esbuild-base -- --sourcemap

    - name: Run server tests with coverage
      run: cd server && npm run coverage

    - name: Check server coverage threshold
      run: cd server && npm run coverage:check

    - name: Compile client tests
      run: npm run compile-tests

    - name: Run client tests
      run: xvfb-run -a npm test

    - name: Package extension
      run: npm run package
      if: success()

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: ditacraft-vsix
        path: '*.vsix'
        retention-days: 30
