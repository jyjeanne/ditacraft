name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  schedule:
    # Run security audit weekly on Mondays at 9:00 AM UTC
    - cron: '0 9 * * 1'

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      id: audit
      run: |
        echo "## 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Run audit and capture output
        if npm audit --audit-level=high 2>&1 | tee audit-output.txt; then
          echo "✅ **No high or critical vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Security vulnerabilities detected**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Generate audit report (JSON)
      if: always()
      run: npm audit --json > audit-report.json 2>/dev/null || true

    - name: Upload audit report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: security-audit-report
        path: |
          audit-output.txt
          audit-report.json
        retention-days: 30
        if-no-files-found: ignore

  lint-and-test:
    needs: security
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install server dependencies
      run: cd server && npm ci

    - name: Run linter
      run: npm run lint

    - name: Type-check (client + server)
      run: npm run check-types

    - name: Build with esbuild
      run: npm run esbuild-base -- --sourcemap

    - name: Run server tests
      if: runner.os != 'Linux'
      run: cd server && npm test

    - name: Run server tests with coverage (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -o pipefail
        cd server && npm run coverage 2>&1 | tee server-test-output.log

    - name: Check server coverage threshold (Linux)
      if: runner.os == 'Linux'
      run: cd server && npm run coverage:check

    - name: Compile client tests
      run: npm run compile-tests

    - name: Run tests with coverage (Linux)
      id: test-linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -o pipefail
        xvfb-run -a npm run coverage 2>&1 | tee test-output.log

    - name: Check coverage threshold (Linux)
      if: runner.os == 'Linux'
      run: npm run coverage:check

    - name: Run tests (Windows)
      id: test-windows
      if: runner.os == 'Windows'
      run: npm test

    - name: Run tests (macOS)
      id: test-macos
      if: runner.os == 'macOS'
      run: npm test

    - name: Display test and coverage summary
      if: always() && runner.os == 'Linux'
      shell: bash
      run: |
        echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Server test results
        if [ -f server/server-test-output.log ]; then
          SERVER_PASSING=$(grep -o '[0-9]* passing' server/server-test-output.log | tail -1 | grep -o '[0-9]*' || echo "0")
          SERVER_FAILING=$(grep -o '[0-9]* failing' server/server-test-output.log | tail -1 | grep -o '[0-9]*' || echo "")

          if [ -n "$SERVER_PASSING" ] && [ "$SERVER_PASSING" != "0" ]; then
            echo "✅ **Server: $SERVER_PASSING tests passing**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$SERVER_FAILING" ]; then
            echo "❌ **Server: $SERVER_FAILING tests failing**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # Client test results
        if [ -f test-output.log ]; then
          PASSING=$(grep -o '[0-9]* passing' test-output.log | tail -1 | grep -o '[0-9]*' || echo "0")
          FAILING=$(grep -o '[0-9]* failing' test-output.log | tail -1 | grep -o '[0-9]*' || echo "")

          if [ -n "$PASSING" ] && [ "$PASSING" != "0" ]; then
            echo "✅ **Client: $PASSING tests passing**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$FAILING" ]; then
            echo "❌ **Client: $FAILING tests failing**" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ Client test output log not found" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### Server Coverage" >> $GITHUB_STEP_SUMMARY
        echo "**Thresholds:** Lines: 90% | Statements: 90% | Functions: 90% | Branches: 80%" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cd server && npx c8 report --reporter=text-summary 2>/dev/null | tail -n 6 >> $GITHUB_STEP_SUMMARY || echo "Coverage report not available" >> $GITHUB_STEP_SUMMARY
        cd ..
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### Client Coverage" >> $GITHUB_STEP_SUMMARY
        echo "**Thresholds:** Lines: 62% | Statements: 62% | Functions: 65% | Branches: 73%" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        npx c8 report --reporter=text-summary 2>/dev/null | tail -n 6 >> $GITHUB_STEP_SUMMARY || echo "Coverage report not available" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 Download the full HTML reports from Artifacts below." >> $GITHUB_STEP_SUMMARY

    - name: Upload client coverage report
      uses: actions/upload-artifact@v7
      if: runner.os == 'Linux' && always()
      continue-on-error: true
      with:
        name: client-coverage-report-${{ github.sha }}
        path: coverage/
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload server coverage report
      uses: actions/upload-artifact@v7
      if: runner.os == 'Linux' && always()
      continue-on-error: true
      with:
        name: server-coverage-report-${{ github.sha }}
        path: server/coverage/
        retention-days: 30
        if-no-files-found: ignore

  package:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install server dependencies
      run: cd server && npm ci

    - name: Compile TypeScript
      run: npm run compile

    - name: Install vsce
      run: npm install -g @vscode/vsce

    - name: Package extension
      run: vsce package

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v7
      with:
        name: ditacraft-${{ github.sha }}-vsix
        path: '*.vsix'
        retention-days: 30
